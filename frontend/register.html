<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script>
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
            document.documentElement.classList.add("dark-mode");
        }
    </script>
</head>
<body>
    <div class="form-box">
        <div class="header">
            <h2>Register</h2>
            <button class="icon-btn" id="themeToggleBtn" data-tooltip="Switch to dark mode">
                    <i class="fa-regular fa-moon"></i>
            </button>
        </div>
        <form id="registerForm" novalidate>
            <div class="form-group">
                <input type="text" name="name" placeholder="Username" required pattern="^\S+$" title="Username cannot contain spaces">
                <small class="error-msg" id="usernameError"></small>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email" required>
                <small class="error-msg" id="emailError"></small>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
                <small class="error-msg" id="passwordError"></small>
            </div>
            <div class="form-group">
                <input type="password" name="confirmPassword" placeholder="Confirm Password" required>
                <small class="error-msg" id="confirmPasswordError"></small>
            </div>

            <button type="submit">Register</button>
            <p>Already have an account? <a href="login.html">Login</a></p>
        </form>

    </div>
    <footer class="footer">
        <p>© 2026 Nenad Krivokapić</p>
        <p>
            Built by Nenad Krivokapić • 
            <a href="https://github.com/nenadk11" target="_blank">
                <i class="fa-brands fa-github"></i> GitHub
            </a>
        </p>
    </footer>
    <script src="js/register.js"></script>
</body>
</html>
